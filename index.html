<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VecMath</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header id="header" class="centered">
      <h1 class="logo">
        <span class="logo-math">Vec</span><span class="logo-net">Math</span>
      </h1>
      <h2 class="subheading">Searchable DB</h2>
      <p class="tagline">Olympiad Math Problems</p>
    </header>

    <div class="search-wrapper" id="searchWrapper">
      <form id="searchForm" class="search-form">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Search math problems..."
            autocomplete="off"
            autofocus
          >
          <button type="submit" class="search-btn">Search</button>
        </div>
      </form>
    </div>

    <div id="results" class="results hidden"></div>

    <div id="status" class="status hidden"></div>

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
      <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <footer>
      <p>Data from <a href="https://mathnet.mit.edu/" target="_blank" rel="noopener">MathNet</a> &middot; By <a href="https://github.com/Alek-Nedelchev" target="_blank" rel="noopener">Aleksandar Nedelchev</a> and <a href="https://github.com/Richard-Zzzzz" target="_blank" rel="noopener">Richard Zhang</a></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
